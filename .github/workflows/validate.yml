name: Validate CloudPort Agent

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: examples/gemini-streamlit-cloudrun-to-qwen-fc/requirements.txt

      - name: Verify canonical and mirrored Skills
        run: diff -ru skills .qwen/skills

      - name: Install example dependencies
        working-directory: examples/gemini-streamlit-cloudrun-to-qwen-fc
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        working-directory: examples/gemini-streamlit-cloudrun-to-qwen-fc
        run: python -m compileall -q app.py cloudport_compat.py smoke_test.py tests

      - name: Run offline unit tests
        working-directory: examples/gemini-streamlit-cloudrun-to-qwen-fc
        run: python -m unittest discover -s tests -v

      - name: Validate deployment script syntax
        working-directory: examples/gemini-streamlit-cloudrun-to-qwen-fc
        run: bash -n deploy.sh
